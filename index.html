<!DOCTYPE html>

<html lang="uk">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Практика локалізації</title>

    <style>

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background-color: #f4f7f9;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            margin: 0;

        }

        .container {

            background: white;

            padding: 40px;

            border-radius: 12px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            max-width: 500px;

            width: 100%;

            text-align: center;

        }

        h1 { color: #2c3e50; margin-bottom: 20px; }

        h2 { color: #34495e; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 5px; }

        p { color: #7f8c8d; line-height: 1.6; font-size: 1.1em; }

       

        .controls { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }

       

        /* Стиль для кнопки мови */

        .btn-lang {

            background-color: #3498db;

            color: white;

            border: none;

            padding: 10px 15px;

            border-radius: 5px;

            cursor: pointer;

            transition: background 0.3s;

        }

        .btn-lang:hover { background-color: #2980b9; }

 

        /* Стиль для нової кнопки реєстрації */

        #btn_register {

            background-color: #27ae60;

            color: white;

            border: none;

            padding: 15px 25px;

            border-radius: 8px;

            font-size: 1.1em;

            font-weight: bold;

            cursor: pointer;

            transition: transform 0.2s, background 0.3s;

        }

        #btn_register:hover {

            background-color: #219150;

            transform: scale(1.05);

        }

    </style>

</head>

<body>

 

    <div class="container">

        <h1 id="title">Завантаження...</h1>

        <h2 id="h_struct"></h2>

        <p id="res_text"></p>

       

        <div class="controls">

            <button id="btn_register">...</button>

           

            <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 10px 0;">

           

            <button class="btn-lang" onclick="toggleLanguage()">Змінити мову / Change Language</button>

        </div>

    </div>

 

    <script>

        let currentLang = 'uk';

 

        async function updateContent(lang) {

            try {

                // Запит до файлу JSON (наприклад, uk.json або en.json)

                const response = await fetch(lang + '.json');

                if (!response.ok) throw new Error('Файл не знайдено');

               

                const data = await response.json();

 

                // Оновлення тексту на сторінці

                document.getElementById('title').innerText = data.title;

                document.getElementById('h_struct').innerText = data.h_struct;

                document.getElementById('res_text').innerText = data.res_text;

               

                // Оновлення тексту нової кнопки

                if (data.btn_register) {

                    document.getElementById('btn_register').innerText = data.btn_register;

                }

 

            } catch (error) {

                console.error('Помилка:', error);

                if (lang === 'en') {

                    alert('Файл en.json не знайдено! Спочатку синхронізуйте переклад з Crowdin до GitHub.');

                }

            }

        }

 

        function toggleLanguage() {

            currentLang = (currentLang === 'uk') ? 'en' : 'uk';

            updateContent(currentLang);

        }

 

        // Завантаження української версії при старті

        updateContent('uk');

    </script>

</body>

</html>
